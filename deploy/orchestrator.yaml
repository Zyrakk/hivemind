apiVersion: v1
kind: Namespace
metadata:
  name: hivemind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hivemind-config
  namespace: hivemind
data:
  config.yaml: |
    app:
      name: hivemind
      log_level: info
    dashboard:
      host: 0.0.0.0
      port: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hivemind-data
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivemind-orchestrator
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hivemind-orchestrator
  template:
    metadata:
      labels:
        app: hivemind-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/zyrak/hivemind:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TELEGRAM_CHAT_ID
              value: "0"
            - name: DATABASE_PATH
              value: /data/hivemind.db
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ZAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: GOOGLE_AI_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hivemind-data
        - name: config
          configMap:
            name: hivemind-config
---
apiVersion: v1
kind: Service
metadata:
  name: hivemind-orchestrator-svc
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  type: ClusterIP
  selector:
    app: hivemind-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: http
