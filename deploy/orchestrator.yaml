apiVersion: v1
kind: Namespace
metadata:
  name: hivemind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hivemind-config
  namespace: hivemind
data:
  config.yaml: |
    glm:
      api_key_env: ZAI_API_KEY
      model: glm-4.7
      base_url: https://open.bigmodel.cn/api/coding/paas/v4/chat/completions
      timeout: 60s
    consultants:
      claude:
        enabled: true
        api_key_env: ANTHROPIC_API_KEY
        model: claude-sonnet-4-5-20250929
        max_monthly_budget_usd: 10.0
        max_calls_per_day: 50
      gemini:
        enabled: true
        api_key_env: GOOGLE_AI_API_KEY
        model: gemini-2.5-flash
        max_calls_per_day: 100
    codex:
      approval_mode: full-auto
      timeout_minutes: 30
      repos_dir: /app/repos
    telegram:
      bot_token_env: TELEGRAM_BOT_TOKEN
      allowed_chat_id: 0
    dashboard:
      host: 0.0.0.0
      port: 8080
    database:
      path: /data/hivemind.db
    git:
      default_remote: origin
      branch_prefix: "feature/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hivemind-data
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivemind-orchestrator
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hivemind-orchestrator
  template:
    metadata:
      labels:
        app: hivemind-orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: data-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /data && chmod -R 775 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
        - name: claude-config-init
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /claude-config/.codex /claude-config/backups

              # Copy codex auth.json to writable location so Codex can refresh expired tokens
              if [ -f /codex-auth-secret/auth.json ]; then
                cp /codex-auth-secret/auth.json /claude-config/.codex/auth.json
                chmod 600 /claude-config/.codex/auth.json
              fi

              if [ -z "$ACCOUNT_UUID" ] || [ -z "$EMAIL" ] || [ -z "$ORG_UUID" ] || [ -z "$ONBOARDING_VERSION" ]; then
                echo "claude-code-auth not fully configured; skipping Claude Code onboarding file"
                printf '{}\n' > /claude-config/.claude.json
                exit 0
              fi

              cat > /claude-config/.claude.json << 'ENDCONFIG'
              {
                "hasCompletedOnboarding": true,
                "lastOnboardingVersion": "$(ONBOARDING_VERSION)",
                "oauthAccount": {
                  "accountUuid": "$(ACCOUNT_UUID)",
                  "emailAddress": "$(EMAIL)",
                  "organizationUuid": "$(ORG_UUID)"
                }
              }
              ENDCONFIG
              sed -i "s/\$(ONBOARDING_VERSION)/$ONBOARDING_VERSION/g" /claude-config/.claude.json
              sed -i "s/\$(ACCOUNT_UUID)/$ACCOUNT_UUID/g" /claude-config/.claude.json
              sed -i "s/\$(EMAIL)/$EMAIL/g" /claude-config/.claude.json
              sed -i "s/\$(ORG_UUID)/$ORG_UUID/g" /claude-config/.claude.json
          env:
            - name: ACCOUNT_UUID
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: account-uuid
                  optional: true
            - name: EMAIL
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: email
                  optional: true
            - name: ORG_UUID
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: organization-uuid
                  optional: true
            - name: ONBOARDING_VERSION
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: onboarding-version
                  optional: true
          volumeMounts:
            - name: claude-config
              mountPath: /claude-config
            - name: codex-auth
              mountPath: /codex-auth-secret
              readOnly: true
      containers:
        - name: orchestrator
          image: ghcr.io/zyrakk/hivemind:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_PATH
              value: /data/hivemind.db
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: HOME
              value: /home/hivemind/.claude
            - name: CLAUDE_CONFIG_DIR
              value: /home/hivemind/.claude
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ZAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: GOOGLE_AI_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-auth
                  key: oauth-token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
            - name: repos
              mountPath: /app/repos
            - name: claude-config
              mountPath: /home/hivemind/.claude
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hivemind-data
        - name: config
          configMap:
            name: hivemind-config
        - name: codex-auth
          secret:
            secretName: codex-auth
        - name: claude-config
          emptyDir: {}
        - name: repos
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hivemind-orchestrator-svc
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  type: ClusterIP
  selector:
    app: hivemind-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: http
