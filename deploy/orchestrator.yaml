apiVersion: v1
kind: Namespace
metadata:
  name: hivemind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hivemind-config
  namespace: hivemind
data:
  config.yaml: |
    glm:
      api_key_env: ZAI_API_KEY
      model: glm-4.7
      base_url: https://open.bigmodel.cn/api/coding/paas/v4/chat/completions
      timeout: 60s
    consultants:
      claude:
        enabled: true
        api_key_env: ANTHROPIC_API_KEY
        model: claude-sonnet-4-5-20250929
        max_monthly_budget_usd: 10.0
        max_calls_per_day: 50
      gemini:
        enabled: true
        api_key_env: GOOGLE_AI_API_KEY
        model: gemini-2.5-flash
        max_calls_per_day: 100
    codex:
      approval_mode: full-auto
      timeout_minutes: 30
      repos_dir: /app/repos
    telegram:
      bot_token_env: TELEGRAM_BOT_TOKEN
      allowed_chat_id: 0
    dashboard:
      host: 0.0.0.0
      port: 8080
    database:
      path: /data/hivemind.db
    git:
      default_remote: origin
      branch_prefix: "feature/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hivemind-data
  namespace: hivemind
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivemind-orchestrator
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hivemind-orchestrator
  template:
    metadata:
      labels:
        app: hivemind-orchestrator
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: orchestrator
          image: ghcr.io/zyrakk/hivemind:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TELEGRAM_CHAT_ID
              value: "0"
            - name: DATABASE_PATH
              value: /data/hivemind.db
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ZAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: GOOGLE_AI_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hivemind-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
            - name: codex-auth
              mountPath: /root/.codex/auth.json
              subPath: auth.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hivemind-data
        - name: config
          configMap:
            name: hivemind-config
        - name: codex-auth
          secret:
            secretName: codex-auth
---
apiVersion: v1
kind: Service
metadata:
  name: hivemind-orchestrator-svc
  namespace: hivemind
  labels:
    app: hivemind-orchestrator
spec:
  type: ClusterIP
  selector:
    app: hivemind-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: http
