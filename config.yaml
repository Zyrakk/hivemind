glm:
  api_key_env: ZAI_API_KEY
  model: glm-4.7
  base_url: https://open.bigmodel.cn/api/coding/paas/v4/chat/completions
  max_retries: 3
  timeout: 120s
  max_tokens: 32768

consultants:
  claude:
    enabled: false
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-5
    max_monthly_budget_usd: 100.0
    max_calls_per_day: 50
    use_for:
      - architecture_review
      - risk_assessment
  gemini:
    enabled: false
    api_key_env: GEMINI_API_KEY
    model: gemini-2.5-pro
    max_calls_per_day: 50
    use_for:
      - test_strategy
      - edge_case_analysis

codex:
  approval_mode: auto
  default_model: gpt-5-codex
  timeout_minutes: 30
  workers_dir: /tmp/hivemind-workers

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  allowed_chat_id: 0

dashboard:
  port: 8080
  host: 0.0.0.0

database:
  path: ./hivemind.db

git:
  default_remote: origin
  branch_prefix: hivemind/
